<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
        Kontak Kami
    </h2>

    <!-- FORM (SUDAH FIX - TIDAK ERROR) -->
    <form onsubmit="kirimData(event)">

        <label class="block mb-1 text-gray-600">Nama Lengkap</label>
        <input type="text" name="nama" placeholder="Masukkan nama"
            class="w-full p-2 mb-4 border rounded">

        <label class="block mb-1 text-gray-600">Email</label>
        <input type="email" name="email" placeholder="Masukkan email"
            class="w-full p-2 mb-4 border rounded">

        <label class="block mb-1 text-gray-600">Tanggal Lahir</label>
        <input type="date" name="tanggal"
            class="w-full p-2 mb-4 border rounded">

        <label class="block mb-1 text-gray-600">Jenis Kelamin</label>
        <div class="mb-4 space-x-4">
            <label><input type="radio" name="jk" value="Laki-laki"> Laki-laki</label>
            <label><input type="radio" name="jk" value="Perempuan"> Perempuan</label>
        </div>

        <label class="block mb-1 text-gray-600">Pekerjaan</label>
        <select name="pekerjaan" class="w-full p-2 mb-4 border rounded">
            <option value="">-- Pilih Pekerjaan --</option>
            <option>Pelajar</option>
            <option>Mahasiswa</option>
            <option>CEO</option>
            <option>Pengangguran</option>
            <option>Lainnya</option>
        </select>

        <label class="block mb-1 text-gray-600">Warna Favorit</label>
        <input type="color" name="warna"
            class="w-full h-10 mb-4 border rounded">

        <label class="block mb-1 text-gray-600">Upload File</label>
        <input type="file" name="file"
            class="w-full mb-6">

        <!-- BUTTON -->
        <div class="flex flex-wrap gap-2 justify-center">

            <button type="submit"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition">
                Kirim
            </button>

            <button type="reset"
                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded transition">
                Batal
            </button>

            <a href="index.html"
                class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition">
                Kembali
            </a>

        </div>

    </form>
</div>

<!-- SCRIPT (BIAR GA ERROR) -->
<script>
function kirimData(event){
    event.preventDefault(); // biar ga reload / error
    alert("✅ Data berhasil dikirim!");
}
</script>

</body>
</html>
